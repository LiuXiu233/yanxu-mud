name: 持续集成

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  history:
    name: 提交元数据
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/check-history.sh

  verify:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            asset: yanxu-x86_64-unknown-linux-gnu.tar.gz
            sha256: 2eb44e9dc5982acca1dbdc6408ed428266b5d4561e7108f19aba870614582990
            sqlite_asset: sqlite-tools-linux-x64-3530300.zip
            sqlite_size: 4264153
            sqlite_sha3: 83b43a9ef8b56f74ece1813161816133045ca834444bfa6bb34c6166328474f8
            sqlite_program: sqlite3
          - name: macOS arm64
            os: macos-latest
            asset: yanxu-aarch64-apple-darwin.tar.gz
            sha256: ad355a1653387331f0d7415681497668229b53478d85446263e70c2a28e7b3ac
            sqlite_asset: sqlite-tools-osx-arm64-3530300.zip
            sqlite_size: 4494145
            sqlite_sha3: b340969cf0e23a4c82c20319032c40cbc39264cb27b9cf71bf51875c24db4204
            sqlite_program: sqlite3
          - name: Windows x64
            os: windows-latest
            asset: yanxu-x86_64-pc-windows-msvc.zip
            sha256: 1eba98ba0043618a30ddb08be4073486a16a0485287fa63aa6e8c488fe9d1ea4
            sqlite_asset: sqlite-tools-win-x64-3530300.zip
            sqlite_size: 6564715
            sqlite_sha3: b943f8ec7ab77433df44520a27ea65744a792e68a25c05b48823168496b3ccdb
            sqlite_program: sqlite3.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 安装并校验言序 1.1.12
        shell: pwsh
        run: |
          $base = 'https://github.com/yanxulang/yanxu/releases/download/v1.1.12'
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/yanxu" | Out-Null
          Invoke-WebRequest "$base/${{ matrix.asset }}" -OutFile "$env:RUNNER_TEMP/${{ matrix.asset }}"
          $actual = (Get-FileHash "$env:RUNNER_TEMP/${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne '${{ matrix.sha256 }}') { throw "言序制品 SHA-256 不一致：$actual" }
          if ('${{ matrix.asset }}'.EndsWith('.zip')) {
            Expand-Archive "$env:RUNNER_TEMP/${{ matrix.asset }}" "$env:RUNNER_TEMP/yanxu" -Force
          } else {
            tar -xzf "$env:RUNNER_TEMP/${{ matrix.asset }}" -C "$env:RUNNER_TEMP/yanxu"
          }
          "$env:RUNNER_TEMP/yanxu" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: 安装并校验 SQLite 3.53.3
        shell: pwsh
        run: |
          $base = 'https://www.sqlite.org/2026'
          $archive = "$env:RUNNER_TEMP/${{ matrix.sqlite_asset }}"
          $directory = "$env:RUNNER_TEMP/sqlite"
          Invoke-WebRequest "$base/${{ matrix.sqlite_asset }}" -OutFile $archive
          $size = (Get-Item -LiteralPath $archive).Length
          if ($size -ne ${{ matrix.sqlite_size }}) { throw "SQLite制品字节数不一致：$size" }
          if ($IsMacOS) {
            $actual = (& python3 -c 'import hashlib, sys; print(hashlib.sha3_256(open(sys.argv[1], "rb").read()).hexdigest())' $archive).Trim()
          } else {
            $bytes = [System.IO.File]::ReadAllBytes($archive)
            $actual = [System.Convert]::ToHexString([System.Security.Cryptography.SHA3_256]::HashData($bytes)).ToLowerInvariant()
          }
          if ($actual -ne '${{ matrix.sqlite_sha3 }}') { throw "SQLite制品 SHA3-256 不一致：$actual" }
          Expand-Archive $archive $directory -Force
          $program = Join-Path $directory '${{ matrix.sqlite_program }}'
          if (-not $IsWindows) { & chmod '+x' $program }
          & $program --version
          "YANYU_SQLITE3=$program" | Out-File -FilePath $env:GITHUB_ENV -Append
          $directory | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: 工具链与依赖
        shell: bash
        run: |
          yanxu 版本 --json
          yanxu 包 锁 .
      - name: 格式检查
        shell: bash
        run: |
          while IFS= read -r -d '' source; do yanxu 格 --写 "$source"; done < <(find src tools tests api-tests examples benchmarks -type f -name '*.yx' -print0 2>/dev/null || true)
          git diff --exit-code -- '*.yx'
      - name: 静态检查
        shell: bash
        run: |
          yanxu 查 src/言域.yx
          yanxu 查 tools/言域.yx
      - name: 单元、集成与内容规格
        shell: bash
        run: yanxu 试 tests --并发 2 --超时 30000 --json
      - name: 双执行器兼容
        shell: bash
        run: yanxu 兼容 tests --json
      - name: 公共 API 消费者契约
        shell: bash
        working-directory: api-tests
        run: |
          yanxu 包 锁 .
          yanxu 试 tests --json
          yanxu 兼容 tests --json
      - name: 青石镇独立包与双执行器
        shell: bash
        working-directory: examples/青石镇
        run: |
          yanxu 包 锁 .
          yanxu tools/生成击杀结算夹具.yx
          git diff --exit-code -- tests/fixtures/击杀结算.json
          yanxu 试 tests --json
          yanxu 兼容 tests --json
      - name: 默认预算本地控制台
        shell: bash
        run: yanxu 包 运行 . -- 控制台 --命令 退出 --存档 .yanxu/ci-console.json --json examples/青石镇
      - name: 示例内容与制品
        shell: bash
        run: |
          yanxu tools/言域.yx -- 内容检查 --行为 言域:技能行为/伤害 --行为 言域:计划行为/刷新 --行为 言域:AI行为/敌对近战 examples/青石镇/内容
          mkdir -p dist
          yanxu --max-steps 20000000 tools/言域.yx -- 构建 --行为 言域:技能行为/伤害 --行为 言域:计划行为/刷新 --行为 言域:AI行为/敌对近战 --输出 dist/青石镇世界.yj --覆盖 examples/青石镇/内容
          test -s dist/青石镇世界.yj
          cmp examples/青石镇/世界.yj dist/青石镇世界.yj
          yanxu --max-steps 20000000 tools/构建青石镇运行时.yx -- dist/青石镇世界.yj dist/青石镇运行时
          diff -ru examples/青石镇/运行时世界 dist/青石镇运行时
      - name: 构建
        shell: bash
        run: yanxu 编 . -o build --release
