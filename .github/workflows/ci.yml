name: 持续集成

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  history:
    name: 提交元数据
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/check-history.sh

  verify:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            asset: yanxu-x86_64-unknown-linux-gnu.tar.gz
          - name: macOS arm64
            os: macos-latest
            asset: yanxu-aarch64-apple-darwin.tar.gz
          - name: Windows x64
            os: windows-latest
            asset: yanxu-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 安装言序 1.1.7
        shell: pwsh
        run: |
          $base = 'https://github.com/yanxulang/yanxu/releases/download/v1.1.7'
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP/yanxu" | Out-Null
          Invoke-WebRequest "$base/${{ matrix.asset }}" -OutFile "$env:RUNNER_TEMP/${{ matrix.asset }}"
          if ('${{ matrix.asset }}'.EndsWith('.zip')) {
            Expand-Archive "$env:RUNNER_TEMP/${{ matrix.asset }}" "$env:RUNNER_TEMP/yanxu" -Force
          } else {
            tar -xzf "$env:RUNNER_TEMP/${{ matrix.asset }}" -C "$env:RUNNER_TEMP/yanxu"
          }
          "$env:RUNNER_TEMP/yanxu" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: 工具链与依赖
        shell: bash
        run: |
          yanxu 版本 --json
          yanxu 包 锁 .
      - name: 格式检查
        shell: bash
        run: |
          while IFS= read -r -d '' source; do yanxu 格 --写 "$source"; done < <(find src tools tests examples benchmarks -type f -name '*.yx' -print0 2>/dev/null || true)
          git diff --exit-code -- '*.yx'
      - name: 静态检查
        shell: bash
        run: |
          yanxu 查 src/言域.yx
          yanxu 查 tools/言域.yx
      - name: 单元、集成与内容规格
        shell: bash
        run: yanxu 试 tests --并发 2 --超时 30000 --json
      - name: 构建
        shell: bash
        run: yanxu 编 . -o build --release
