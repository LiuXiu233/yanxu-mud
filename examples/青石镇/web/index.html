<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>言域 · 青石镇</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-block">
      <span class="brand-name">言域</span>
      <span class="world-name">青石镇</span>
    </div>
    <nav class="view-switcher" aria-label="视图">
      <button type="button" class="view-button is-active" data-view="game">游戏</button>
      <button type="button" class="view-button" data-view="map">地图</button>
      <button type="button" class="view-button" data-view="status">状态</button>
    </nav>
    <div class="connection-tools">
      <span id="connection-status" class="connection-state" data-state="offline">未连接</span>
      <button id="reconnect-button" class="icon-button" type="button" title="重新连接" aria-label="重新连接">↻</button>
      <button id="logout-button" class="command-button" type="button">退出</button>
    </div>
  </header>

  <main class="workspace" data-active-view="game">
    <aside class="side-panel status-panel" aria-label="角色与世界状态">
      <section class="panel-section identity-section">
        <span class="section-label">当前角色</span>
        <strong id="character-name" class="character-name">未选择</strong>
        <span id="location-name" class="muted-line">等待世界状态</span>
      </section>

      <section class="panel-section meters-section">
        <div class="meter-row">
          <div class="meter-label"><span>生命</span><span id="health-value">--</span></div>
          <progress id="health-meter" max="100" value="0"></progress>
        </div>
        <div class="meter-row">
          <div class="meter-label"><span>状态</span><span id="state-value">未同步</span></div>
          <div class="state-strip" aria-hidden="true"><span></span></div>
        </div>
      </section>

      <section class="panel-section quick-section">
        <span class="section-label">常用命令</span>
        <div class="quick-grid">
          <button type="button" data-command="观察">观察</button>
          <button type="button" data-command="背包">背包</button>
          <button type="button" data-command="状态">状态</button>
          <button type="button" data-command="任务">任务</button>
          <button type="button" data-command="技能">技能</button>
          <button type="button" data-command="帮助">帮助</button>
        </div>
      </section>

      <section class="panel-section server-section">
        <span class="section-label">服务器</span>
        <dl class="facts-list">
          <div><dt>版本</dt><dd id="server-version">--</dd></div>
          <div><dt>在线</dt><dd id="online-count">--</dd></div>
          <div><dt>内容</dt><dd id="content-state">--</dd></div>
        </dl>
      </section>
    </aside>

    <section class="game-panel" aria-label="游戏消息">
      <div class="transcript-toolbar">
        <span id="session-label">本地会话</span>
        <button id="clear-button" class="icon-button subtle" type="button" title="清空消息" aria-label="清空消息">×</button>
      </div>
      <div id="transcript" class="transcript" role="log" aria-live="polite" aria-relevant="additions">
        <article class="message-entry system-entry">
          <div class="message-meta"><span>系统</span></div>
          <div class="message-body">等待连接青石镇。</div>
        </article>
      </div>
      <form id="command-form" class="command-form" autocomplete="off">
        <label class="sr-only" for="command-input">命令</label>
        <input id="command-input" name="command" type="text" maxlength="4096" placeholder="输入命令" disabled>
        <button id="send-button" class="send-button" type="submit" title="发送命令" aria-label="发送命令" disabled>→</button>
      </form>
    </section>

    <aside class="map-panel" aria-label="青石镇地图">
      <div class="map-heading">
        <div>
          <span class="section-label">区域地图</span>
          <strong>青石镇</strong>
        </div>
        <span id="map-location" class="map-location">中央街</span>
      </div>
      <div class="map-frame">
        <img src="/assets/qingshi-map.png" alt="青石镇十三处地点及道路地图" width="1600" height="900">
      </div>
      <div class="direction-pad" aria-label="移动">
        <button type="button" data-command="北" title="向北">↑</button>
        <button type="button" data-command="西" title="向西">←</button>
        <button type="button" data-command="观察" title="观察当前位置">◎</button>
        <button type="button" data-command="东" title="向东">→</button>
        <button type="button" data-command="南" title="向南">↓</button>
      </div>
    </aside>
  </main>

  <dialog id="login-dialog" class="login-dialog">
    <form id="login-form" method="dialog" class="login-form">
      <div class="dialog-heading">
        <span class="dialog-brand">言域 · 青石镇</span>
        <h1>进入游戏</h1>
      </div>
      <label for="login-name">登录名</label>
      <input id="login-name" name="loginName" type="text" minlength="3" maxlength="64" autocomplete="username" required>
      <label for="login-password">密码</label>
      <input id="login-password" name="password" type="password" maxlength="1024" autocomplete="current-password" required>
      <label for="role-id">角色编号</label>
      <input id="role-id" name="roleId" type="text" maxlength="512" autocomplete="off" placeholder="可留空">
      <p id="login-error" class="form-error" role="alert"></p>
      <div class="dialog-actions">
        <button id="guest-button" class="secondary-button" type="button">游客进入</button>
        <button id="login-button" class="primary-button" type="submit">登录</button>
      </div>
    </form>
  </dialog>

  <script src="/assets/app.js" defer></script>
</body>
</html>
